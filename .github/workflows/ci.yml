name: CI/CD Pipeline - DS2

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  Code-Quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Check src folder exists
        run: |
          if [ ! -d "src" ]; then
            echo "❌ Dossier src/ introuvable"
            exit 1
          fi
          echo "✅ Dossier src/ trouvé"

      - name: Validate HTML
        run: |
          if ls src/*.html 1>/dev/null 2>&1; then
            htmlhint "src/**/*.html"
          else
            echo "❌ Aucun fichier HTML dans src/"
            exit 1
          fi