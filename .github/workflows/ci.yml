name: CI - Intégration Continue

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ═══════════════════════════════════════
  # ÉTAPE 1 — Tests HTML/CSS
  # ═══════════════════════════════════════
  Code-Quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Check src folder exists
        run: |
          if [ ! -d "src" ]; then
            echo "❌ Dossier src/ introuvable"
            exit 1
          fi
          echo "✅ Dossier src/ trouvé"
          ls src/

      - name: Validate HTML
        run: |
          if ls src/*.html 1>/dev/null 2>&1; then
            htmlhint "src/**/*.html"
            echo "✅ HTML valide"
          else
            echo "❌ Aucun fichier HTML dans src/"
            exit 1
          fi

  # ═══════════════════════════════════════
  # ÉTAPE 2 — Build Docker
  # ═══════════════════════════════════════
  Build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: Code-Quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fresta:${{ github.sha }} .
          echo "✅ Image construite"

      - name: Test container startup
        run: |
          docker run -d -p 80:80 --name test-container \
            ${{ secrets.DOCKER_USERNAME }}/fresta:${{ github.sha }}
          sleep 5
          curl -f http://localhost:80 || exit 1
          echo "✅ Site répond sur port 80"
          docker stop test-container
          docker rm test-container

      - name: Show image size
        run: docker images

  # ═══════════════════════════════════════
  # ÉTAPE 3 — Security Scan (Bonus)
  # ═══════════════════════════════════════
  Security:
    name: Security Scan Trivy
    runs-on: ubuntu-latest
    needs: Build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image for scan
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fresta:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/fresta:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true