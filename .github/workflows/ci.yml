name: CI - Intégration Continue

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : Code Quality (HTML/CSS check)
  # ─────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    continue-on-error: true  # ne bloque pas les jobs suivants

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Installer htmlhint
        run: npm install -g htmlhint

      - name: Vérifier les fichiers HTML
        run: |
          htmlhint "**/*.html" || true

  # ─────────────────────────────────────────
  # JOB 2 : Build Docker Image
  # ─────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: code-quality
    if: always()  # s'exécute même si code-quality échoue

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Login sur Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fresta:latest

  # ─────────────────────────────────────────
  # JOB 3 : Security Scan (Trivy)
  # ─────────────────────────────────────────
  security-scan:
    name: Security Scan Trivy
    runs-on: ubuntu-latest
    needs: build-docker
    if: always()

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Scanner l'image avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/fresta:latest
          format: table
          exit-code: 0          # 0 = ne bloque pas la pipeline
          ignore-unfixed: true
          severity: CRITICAL,HIGH