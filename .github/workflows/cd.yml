name: CD - Déploiement Continu

on:
  workflow_run:
    workflows: ["CI - Intégration Continue"]
    types:
      - completed
    branches: [main]

jobs:
  Build-and-Push:
    name: Build & Push Docker Hub
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Se connecter à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 3. Configurer Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Builder et pousser l'image
      - name: Build and push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/problemsv-web:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/problemsv-web:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/problemsv-web:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/problemsv-web${{ github.sha }}
          echo "✅ Image poussée sur Docker Hub"

      # 5. Vérifier l'image
      - name: Show image info
        run: docker images