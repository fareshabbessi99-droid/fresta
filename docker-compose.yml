version: '3.9'

services:

  # ─── Service principal : site web ───────────────────────────────────────
  web:
    build: .
    container_name: ds2-web
    ports:
      - "80:80"
    volumes:
      - ./src:/usr/share/nginx/html:ro
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Service bonus : visualiseur de logs ────────────────────────────────
  logs:
    image: python:3.11-alpine
    container_name: ds2-logs
    working_dir: /app
    volumes:
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    command: python -m http.server 8080
    networks:
      - app-net
    restart: unless-stopped
    depends_on:
      - web

# ─── Réseau partagé entre les services ──────────────────────────────────
networks:
  app-net:
    driver: bridge

# ─── Volume persistant pour les logs ────────────────────────────────────
volumes:
  logs-data: